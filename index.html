<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{

    background:white;
    width:100%;
    max-width:380px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);

}

.login-box h2{

    margin-bottom:25px;
    color:#1e293b;
    font-size:35px;

}

.input-group{

    margin:15px 0;

}

input{

    width:100%;
    padding:15px;
    border-radius:15px;
    border:1px solid #dbe2ea;
    font-size:17px;
    outline:none;

}

input:focus{

    border-color:#007bff;

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    background:#007bff;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;

}

button:hover{

    background:#0056b3;

}

.message{

    margin-top:20px;
    font-size:15px;

}

.success{

    color:green;

}

.error{

    color:red;

}

.demo{

    margin-top:20px;
    font-size:13px;
    color:#64748b;

}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<div class="input-group">

<input type="text" id="username" placeholder="اسم المستخدم">

</div>

<div class="input-group">

<input type="password" id="password" placeholder="كلمة المرور">

</div>

<button id="loginBtn">دخول</button>

<div class="message" id="message"></div>

<div class="demo">

بيانات تجريبية: admin / 1234

</div>

</div>

<script>

const button = document.getElementById("loginBtn");

button.addEventListener("click", login);

function login(){

    let username = document.getElementById("username").value.trim();

    let password = document.getElementById("password").value.trim();

    let message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "message";

    if(username === ""){

        message.innerHTML = "الرجاء إدخال اسم المستخدم";
        message.classList.add("error");
        return;

    }

    if(password === ""){

        message.innerHTML = "الرجاء إدخال كلمة المرور";
        message.classList.add("error");
        return;

    }

    if(username === "admin" && password === "1234"){

        message.innerHTML = "تم تسجيل الدخول بنجاح";
        message.classList.add("success");

        sendTelegram();

    }else{

        message.innerHTML = "اسم المستخدم أو كلمة المرور غير صحيحة";
        message.classList.add("error");

    }

}

function sendTelegram(){

    let token = "ضع_التوكن_الجديد_هنا";

    let chat_id = "545284527";

    let text = "تم تسجيل دخول جديد إلى الموقع";

    fetch(`https://api.telegram.org/bot${token}/sendMessage`,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            chat_id:chat_id,
            text:text

        })

    })

    .then(response => response.json())

    .then(data => {

        console.log(data);

    })

    .catch(error => {

        console.log(error);

    });

}

</script>

</body>
</html>
