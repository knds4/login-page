<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

.login-box{

    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    text-align:center;

}

.login-box h2{

    margin-bottom:25px;
    color:#1e293b;

}

.login-box input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;

}

.login-box input:focus{

    border-color:#007bff;

}

.login-box button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;

}

.login-box button:hover{

    background:#0056b3;

}

.message{

    margin-top:15px;
    font-size:15px;

}

.success{

    color:green;

}

.error{

    color:red;

}

.demo{

    margin-top:15px;
    font-size:13px;
    color:#64748b;

}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="message" id="message"></div>

<div class="demo">

بيانات تجريبية: admin / 1234

</div>

</div>

<script>

function login(){

    let username = document.getElementById("username").value.trim();

    let password = document.getElementById("password").value.trim();

    let message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "message";

    if(username === "admin" && password === "1234"){

        message.innerHTML = "تم تسجيل الدخول بنجاح";

        message.classList.add("success");

        sendTelegram();

    }else{

        message.innerHTML = "اسم المستخدم أو كلمة المرور غير صحيحة";

        message.classList.add("error");

    }

}

function sendTelegram(){

    let token = "5332397047:AAHRZXSwxT3EfCT8xtCku4wh-xtE0cjla98";

    let chat_id = "545284527";

    let text = "تم تسجيل دخول جديد إلى الموقع";

    fetch(`https://api.telegram.org/bot${token}/sendMessage`,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            chat_id:chat_id,
            text:text

        })

    })

    .then(response => response.json())

    .then(data => {

        console.log(data);

    })

    .catch(error => {

        console.log(error);

    });

}

</script>

</body>

</html>
